server {
    listen 80;
    server_name api.thinksync.ai;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.thinksync.ai;

    ssl_certificate /etc/letsencrypt/live/api.thinksync.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thinksync.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Rate limiting at nginx level (burst then pass to app)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req zone=api_limit burst=200 nodelay;

    # Max body size (large prompts with context)
    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (streaming)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 300s;
    }

    # Metrics endpoint (internal only)
    location /metrics {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/thinksync-access.log;
    error_log /var/log/nginx/thinksync-error.log;
}